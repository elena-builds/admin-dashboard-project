<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Avatar 1">
  <defs>
    <clipPath id="clip">
      <circle cx="48" cy="48" r="44"></circle>
    </clipPath>
  </defs>

  <circle cx="48" cy="48" r="44" fill="#EAF2FF"></circle>

  <g clip-path="url(#clip)">
    <!-- background blobs -->
    <circle cx="20" cy="28" r="18" fill="#D7E7FF"></circle>
    <circle cx="84" cy="68" r="22" fill="#DDEBFF"></circle>

    <!-- head -->
    <circle cx="48" cy="46" r="20" fill="#FFB36B"></circle>
    <!-- ears -->
    <path d="M30 38 C30 26, 38 22, 42 34 C38 36, 34 38, 30 38Z" fill="#FF8A4A"></path>
    <path d="M66 38 C66 26, 58 22, 54 34 C58 36, 62 38, 66 38Z" fill="#FF8A4A"></path>

    <!-- cheeks -->
    <circle cx="38" cy="50" r="4" fill="#FF8FA3" opacity="0.7"></circle>
    <circle cx="58" cy="50" r="4" fill="#FF8FA3" opacity="0.7"></circle>

    <!-- eyes -->
    <circle cx="41" cy="46" r="3" fill="#233044"></circle>
    <circle cx="55" cy="46" r="3" fill="#233044"></circle>
    <circle cx="40" cy="45" r="1" fill="#FFFFFF"></circle>
    <circle cx="54" cy="45" r="1" fill="#FFFFFF"></circle>

    <!-- nose + mouth -->
    <path d="M48 49 L45 52 L51 52 Z" fill="#233044"></path>
    <path d="M45 55 C47 58, 49 58, 51 55" fill="none" stroke="#233044" stroke-width="2" stroke-linecap="round"></path>

    <!-- shoulders -->
    <path d="M18 96 C22 76, 36 68, 48 68 C60 68, 74 76, 78 96 Z" fill="#5B7CFF"></path>
    <path d="M28 96 C31 81, 39 76, 48 76 C57 76, 65 81, 68 96 Z" fill="#FFFFFF" opacity="0.9"></path>
  </g>

  <circle cx="48" cy="48" r="44" fill="none" stroke="#C9DBFF" stroke-width="2"></circle>
</svg>