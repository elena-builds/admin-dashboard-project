<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Avatar 3">
  <defs>
    <clipPath id="clip3">
      <circle cx="48" cy="48" r="44"></circle>
    </clipPath>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF7FF"></stop>
      <stop offset="1" stop-color="#D9ECFF"></stop>
    </linearGradient>
  </defs>

  <circle cx="48" cy="48" r="44" fill="url(#g3)"></circle>

  <g clip-path="url(#clip3)">
    <!-- background rings -->
    <circle cx="68" cy="30" r="18" fill="none" stroke="#BEE3FF" stroke-width="6" opacity="0.6"></circle>
    <circle cx="20" cy="70" r="16" fill="none" stroke="#BEE3FF" stroke-width="6" opacity="0.35"></circle>

    <!-- antenna -->
    <path d="M48 14 L48 24" stroke="#233044" stroke-width="3" stroke-linecap="round"></path>
    <circle cx="48" cy="12" r="4" fill="#FF4D6D"></circle>

    <!-- helmet -->
    <rect x="26" y="26" width="44" height="46" rx="16" fill="#2F3A4F"></rect>
    <rect x="30" y="32" width="36" height="26" rx="10" fill="#78D1FF"></rect>

    <!-- visor highlights -->
    <path d="M34 40 C38 36, 44 34, 50 34" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.75"></path>
    <path d="M34 48 C40 43, 48 40, 56 40" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.35"></path>

    <!-- eyes inside visor -->
    <circle cx="42" cy="45" r="3" fill="#233044"></circle>
    <circle cx="54" cy="45" r="3" fill="#233044"></circle>

    <!-- mouth panel -->
    <rect x="36" y="60" width="24" height="8" rx="4" fill="#5B7CFF"></rect>
    <path d="M40 64 H56" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.9"></path>

    <!-- body -->
    <path d="M14 96 C18 78, 34 70, 48 70 C62 70, 78 78, 82 96 Z" fill="#FFB703"></path>
    <path d="M30 96 C33 83, 40 80, 48 80 C56 80, 63 83, 66 96 Z" fill="#FFFFFF" opacity="0.9"></path>
  </g>

  <circle cx="48" cy="48" r="44" fill="none" stroke="#B9DDFF" stroke-width="2"></circle>
</svg>